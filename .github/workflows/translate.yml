name: Translate Novel

on:
  workflow_dispatch:
  push:
    paths:
      - "input/*.epub"
      - "input/*.pdf"
  schedule:
    - cron: "0 */6 * * *"

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "eptran-bot"
          git config user.email "eptran-bot@users.noreply.github.com"

      - name: Run translation
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          # GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          # GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
        run: python scripts/translate.py
